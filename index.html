<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="styles/style.css">
        <link rel="stylesheet" href="styles/media-query.css">
        <title>Login</title>
    </head>

    <body>
        <main>
            <section id="login">
                <div id="imagem">
                    <!-- Imagem aplicada com CSS -->
                </div>

                <div id="formulario">
                    <h1>Login</h1>
                    <p>Seja bem-vindo(a) novamente. Realize seu login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>

                    <form action="login.php" method="post" autocomplete="on">
                        <div class="campo">
                            <label for="email"><span class="material-icons">person</span></label>
                            <input type="email" id="email" name="email" placeholder="Seu email" required autocomplete="email" maxlength="30">
                        </div>
                        <div class="campo">
                            <label for="senha"><span class="material-icons">password</span></label>
                            <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password" minlength="8" maxlength="15">
                        </div>

                        <button type="submit">Entrar</button>
                        <a href="#">Esqueci a senha <span class="material-icons" id="mail">mail</span></a>
                    </form>
                </div>
            </section>
        </main>
    </body>

</html>
