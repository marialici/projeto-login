<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="styles/style.css">
        <link rel="stylesheet" href="styles/media-query.css">
        <title>Login</title>
    </head>

    <body>
        <main>
            <section id="login">
                <div id="imagem">
                    Foto
                </div>
                <div id="formulario">
                    <h1>Login</h1>
                    <p>Seja bem-vindo(a) novamente. Realize seu login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>

                    <form method="post">
                        <div>
                            <label for="email"><span class="material-icons">person</span></label>

                            <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                        </div>
                        <div>
                            <label for="senha"><span class="material-icons">password</span></label>

                            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </body>

</html>
